name: cuicuisine
description: "A recipe book app."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.2
  flutter_tags_x: ^1.1.0
  intl: any
  intl_utils: ^2.8.7
  dynamic_themes: ^1.1.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  font_awesome_flutter: ^10.7.0
  duration_picker: ^1.1.1
  flutter_image_slideshow: ^0.1.6
  image_picker: ^1.0.7
  flutter_native_splash: ^2.3.10
  flutter_html: ^3.0.0-beta.2
  flutter_typeahead: ^5.0.1
  flutter_inappwebview: ^6.1.5
  html_editor_enhanced: ^2.7.1
  reorderables: ^0.6.0
  file_picker: ^10.3.3
  share_plus: ^7.2.2
  flutter_alarm_clock: ^0.1.1
  clipboard: ^0.1.3
  hive_generator: ^2.0.1
  path_provider: ^2.1.2
  http: ^1.2.0
  oauth2: ^2.0.2
  wakelock_plus: ^1.1.6
  google_fonts: ^7.0.2
  uuid: ^4.3.3
  url_launcher: ^6.3.0
  path: ^1.8.3
  objectid: ^3.0.0
  encrypt: ^5.0.3
  diacritic: ^0.1.6
  file_saver: ^0.2.12
  qr_flutter: ^4.1.0
  qr_code_scanner_plus: ^2.0.10+1
  window_size: ^0.1.0
  flutter_quill: ^11.5.0
  flutter_quill_delta_from_html: ^1.5.3
  toastification: ^3.0.3
  package_info_plus: ^8.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.8
  flutter_launcher_icons: ^0.13.1

flutter_app_name:
  name: "Cuicuisine"

flutter:
  uses-material-design: true

  assets:
    - assets/icons/splash_icon.png
    - assets/images/default_image.png
    - assets/images/default_circle_image.png
    - fonts/google_fonts/comfortaa/
    - assets/keys/
    - assets/ca/
  
  fonts:
    - family: CustomIcons
      fonts:
        - asset: fonts/CustomIcons.ttf
  
flutter_intl:
  enabled: true # Required. Must be set to true to activate the package. Default: false
  class_name: S # Optional. Sets the name for the generated localization class. Default: S
  main_locale: fr # Optional. Sets the main locale used for generating localization files. Provided value should consist of language code and optional script and country codes separated with underscore (e.g. 'en', 'en_GB', 'zh_Hans', 'zh_Hans_CN'). Default: en
  arb_dir: lib/l10n # Optional. Sets the directory of your ARB resource files. Provided value should be a valid path on your system. Default: lib/l10n
  output_dir: lib/generated # Optional. Sets the directory of generated localization files. Provided value should be a valid path on your system. Default: lib/generated
  use_deferred_loading: false # Optional. Must be set to true to generate localization code that is loaded with deferred loading. Default: false

flutter_launcher_icons:
  android: "launcher_icon"
  ios: false
  image_path: "assets/icons/icon.png"
  adaptive_icon_foreground: "assets/icons/icon.png"
  adaptive_icon_background: "#0b1313"


flutter_native_splash:
  color: "#0b1313"
  #background_image: "assets/background.png"

  # Optional parameters are listed below.  To enable a parameter, uncomment the line by removing
  # the leading # character.

  # The image parameter allows you to specify an image used in the splash screen.  It must be a
  # png file and should be sized for 4x pixel density.
  image: assets/icons/splash_icon.png
  android: true
  web: true
  ios: false
